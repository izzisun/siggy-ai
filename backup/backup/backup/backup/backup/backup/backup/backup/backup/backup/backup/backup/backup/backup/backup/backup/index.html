<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siggy AI Chat</title>
<style>
  body { font-family: Arial; margin:0; padding:0; background:#f5f5f5; transition: background 0.3s, color 0.3s; }
  body.dark { background:#1e1e1e; color:#eee; }
  #chat-container { max-width:600px; margin:50px auto; padding:20px; background:white; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
  body.dark #chat-container { background:#2c2c2c; }
  .message { display:flex; margin:10px 0; }
  .message.user { justify-content:flex-end; }
  .bubble { max-width:70%; padding:10px 15px; border-radius:20px; }
  .user .bubble { background:#4caf50; color:white; border-bottom-right-radius:0; }
  .assistant .bubble { background:#e0e0e0; color:black; border-bottom-left-radius:0; }
  body.dark .assistant .bubble { background:#444; color:white; }
  .avatar { width:40px; height:40px; border-radius:50%; margin-right:10px; }
  .input-container { display:flex; margin-top:10px; }
  .input-container input { flex:1; padding:10px; border-radius:20px; border:1px solid #ccc; }
  .input-container button { padding:10px 20px; border:none; border-radius:20px; margin-left:10px; background:#2196f3; color:white; cursor:pointer; }
  #toggle-theme { position:fixed; top:10px; right:10px; cursor:pointer; padding:5px 10px; border:1px solid #2196f3; border-radius:5px; background:white; color:#2196f3; }
  body.dark #toggle-theme { background:#2196f3; color:white; border-color:white; }
</style>
</head>
<body>
<button id="toggle-theme">🌙 Dark Mode</button>
<div id="chat-container">
  <div id="messages"></div>
  <div class="input-container">
    <input type="text" id="inputMessage" placeholder="Ketik pesan..." />
    <button onclick="sendMessage()">Kirim</button>
  </div>
</div>

<script>
  const messagesDiv = document.getElementById("messages")
  const input = document.getElementById("inputMessage")
  const sessionId = Date.now().toString() // session unik per user

  function addMessage(content, role){
    const msgDiv = document.createElement("div")
    msgDiv.className = "message " + role
    const avatar = document.createElement("img")
    avatar.className = "avatar"
    avatar.src = role === "user" ? "user.png" : "siggy.png"
    const bubble = document.createElement("div")
    bubble.className = "bubble"
    bubble.innerText = content
    if(role==="user"){
      msgDiv.appendChild(bubble)
      msgDiv.appendChild(avatar)
    }else{
      msgDiv.appendChild(avatar)
      msgDiv.appendChild(bubble)
    }
    messagesDiv.appendChild(msgDiv)
    messagesDiv.scrollTop = messagesDiv.scrollHeight
  }

  async function sendMessage(){
    const text = input.value.trim()
    if(!text) return
    addMessage(text,"user")
    input.value = ""
    try{
      const res = await fetch("/chat",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({message:text, sessionId})
      })
      const data = await res.json()
      addMessage(data.reply,"assistant")
    }catch(e){
      addMessage("AI error","assistant")
    }
  }

  // Toggle dark/light mode
  const toggle = document.getElementById("toggle-theme")
  toggle.onclick = ()=>{
    document.body.classList.toggle("dark")
  }
</script>
</body>
</html>
