<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siggy AI</title>
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
  header { background: #4b6cb7; color: white; text-align: center; padding: 1rem; font-size: 1.5rem; }
  #chat { max-width: 600px; margin: 1rem auto; background: white; padding: 1rem; border-radius: 8px; height: 400px; overflow-y: auto; }
  .message { margin: 0.5rem 0; display: flex; align-items: flex-start; }
  .message.user img, .message.assistant img { width: 40px; height: 40px; border-radius: 50%; margin-right: 0.5rem; }
  .message.user .text { background: #e1ffc7; padding: 0.5rem 1rem; border-radius: 12px; }
  .message.assistant .text { background: #f1f1f1; padding: 0.5rem 1rem; border-radius: 12px; }
  form { max-width: 600px; margin: 0 auto; display: flex; padding: 0 1rem; }
  input[type=text] { flex: 1; padding: 0.5rem; border-radius: 20px; border: 1px solid #ccc; }
  button { display: none; }
</style>
</head>
<body>
<header>Siggy AI</header>
<div id="chat"></div>
<form id="chatForm">
  <input type="text" id="messageInput" placeholder="Ketik pesan dan tekan Enter..." autocomplete="off" required>
  <button type="submit">Send</button>
</form>

<script>
  const chatDiv = document.getElementById("chat");
  const form = document.getElementById("chatForm");
  const input = document.getElementById("messageInput");
  const sessionId = "default_session";

  function appendMessage(role, text) {
    const div = document.createElement("div");
    div.classList.add("message", role);
    const img = document.createElement("img");
    img.src = role === "user" ? "user.png" : "siggy.png"; // default gambar
    const span = document.createElement("div");
    span.classList.add("text");
    span.textContent = text;
    div.appendChild(img);
    div.appendChild(span);
    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;
    appendMessage("user", message);
    input.value = "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, sessionId })
      });
      const data = await res.json();
      if (data.reply) appendMessage("assistant", data.reply);
    } catch (err) {
      console.error(err);
      appendMessage("assistant", "Error, coba lagi.");
    }
  });

  // Kirim pesan pakai Enter
  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") form.dispatchEvent(new Event("submit"));
  });
</script>
</body>
</html>
